name: Mandoline
options:
  bundleIdPrefix: com.rowan
  deploymentTarget:
    macOS: 15.0

targets:
  Mandoline:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
    settings:
      CODE_SIGN_ENTITLEMENTS: Mandoline.entitlements
      ENABLE_USER_SCRIPT_SANDBOXING: YES
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_ATSApplicationFontsPath: "."
      INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Rowan"
      INFOPLIST_KEY_LSMinimumSystemVersion: "15.0"
      INFOPLIST_KEY_NSDesktopFolderUsageDescription: "Mandoline needs access to your folders to help you review and clean up your media."
      INFOPLIST_KEY_NSDocumentsFolderUsageDescription: "Mandoline needs access to your folders to help you review and clean up your media."
      INFOPLIST_KEY_NSDownloadsFolderUsageDescription: "Mandoline needs access to your folders to help you review and clean up your media."
      INFOPLIST_KEY_NSRemovableVolumesUsageDescription: "Mandoline needs access to external drives to help you review and clean up your media."
